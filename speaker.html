<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Announcements — Speaker</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #080c14;
    color: #ffffff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }

  #activate {
    cursor: pointer;
  }

  h1 { font-size: 32px; font-weight: bold; margin-bottom: 12px; letter-spacing: 2px; }
  p  { font-size: 16px; color: #888888; line-height: 1.6; }

  #status { display: none; margin-top: 24px; }
  .dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: #22c55e; display: inline-block;
    margin-right: 8px; vertical-align: middle;
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-text { font-size: 16px; color: #22c55e; }

  #playing {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    color: #e87c2a;
    display: none;
    animation: flash 0.8s ease-in-out infinite alternate;
  }
  @keyframes flash { from{opacity:1} to{opacity:0.5} }

  #last {
    margin-top: 16px;
    font-size: 13px;
    color: #333333;
  }

  .conn { margin-top: 12px; font-size: 12px; color: #333333; }
</style>
</head>
<body>

<div id="activate" onclick="activate()">
  <h1>&#128266; TAP TO ACTIVATE</h1>
  <p>Keep this page open on the speaker computer.<br>Tap once to enable audio announcements.</p>
</div>

<div id="status">
  <div><span class="dot"></span><span class="status-text">Listening for announcements</span></div>
  <div id="playing">&#128266; PLAYING ANNOUNCEMENT...</div>
  <div id="last"></div>
</div>

<div class="conn" id="conn">Connecting...</div>

<script>
const socket = io();
let activated = false;

socket.on('connect', () => {
  document.getElementById('conn').textContent = 'Connected ✓';
  document.getElementById('conn').style.color = '#1a7a4a';
});

socket.on('disconnect', () => {
  document.getElementById('conn').textContent = 'Disconnected — reconnecting...';
  document.getElementById('conn').style.color = '#e53e3e';
});

function activate() {
  activated = true;
  document.getElementById('activate').style.display = 'none';
  document.getElementById('status').style.display = 'block';
  // Unlock audio context with user gesture
  var silent = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
  silent.play().catch(() => {});
}

socket.on('announce', function(msg) {
  if (!activated) return;

  const playingEl = document.getElementById('playing');
  playingEl.style.display = 'block';

  // Convert base64 to blob and play
  function playBase64(base64, onDone) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.volume = 1;
    audio.play().catch(e => { console.log('Audio error:', e); onDone(); });
    audio.onended = () => { URL.revokeObjectURL(url); onDone(); };
  }

  // Play English first, then Mandarin
  playBase64(msg.englishAudio, () => {
    // Small gap between languages
    setTimeout(() => {
      playBase64(msg.mandarinAudio, () => {
        playingEl.style.display = 'none';
        const now = new Date();
        const label = msg.type === '10min' ? 'Departing in 10 min' : 'Departing NOW';
        document.getElementById('last').textContent = 'Last: ' + label + ' at ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
      });
    }, 800);
  });
});
</script>
</body>
</html>
